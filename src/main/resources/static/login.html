<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SmartRent — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
          font-family: 'Poppins', sans-serif;
          background: #f0f4ff;
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 20px;
        }

        .card {
          background: #fff;
          border-radius: 24px;
          padding: 40px 40px 36px;
          width: 100%;
          max-width: 400px;
          box-shadow: 0 8px 40px rgba(0,0,0,0.08);
          text-align: center;
        }

        .logo { margin-bottom: 24px; }

        .logo-icon {
          width: 52px; height: 52px;
          background: #eef0ff;
          border-radius: 14px;
          display: flex; align-items: center; justify-content: center;
          margin: 0 auto 8px;
        }

        .logo-icon svg { width: 28px; height: 28px; fill: #4a6cf7; }

        .logo-name { font-size: 18px; font-weight: 700; color: #1a1a2e; }
        .logo-name span { color: #f5a623; }

        .field { margin-bottom: 14px; text-align: left; }

        .field label {
          display: block;
          font-size: 12px;
          font-weight: 500;
          color: #555;
          margin-bottom: 6px;
        }

        .field input {
          width: 100%;
          background: #f4f6fb;
          border: 1.5px solid transparent;
          border-radius: 50px;
          padding: 12px 18px;
          font-family: 'Poppins', sans-serif;
          font-size: 13px;
          color: #1a1a2e;
          outline: none;
          transition: border-color 0.2s, box-shadow 0.2s;
        }

        .field input::placeholder { color: #bbb; }

        .field input:focus {
          border-color: #4a6cf7;
          box-shadow: 0 0 0 3px rgba(74,108,247,0.1);
        }

        .forgot { text-align: right; margin-top: -6px; margin-bottom: 20px; }
        .forgot a { font-size: 11px; color: #4a6cf7; text-decoration: none; }
        .forgot a:hover { text-decoration: underline; }

        .alert {
          padding: 9px 14px;
          border-radius: 10px;
          font-size: 12px;
          margin-bottom: 14px;
          display: none;
          text-align: left;
        }
        .alert.error   { background: #fff0f0; border: 1px solid #ffcccc; color: #e53935; display: block; }
        .alert.success { background: #f0fff4; border: 1px solid #b2dfdb; color: #2e7d32; display: block; }

        .btn {
          width: 100%;
          background: #4a6cf7;
          border: none;
          border-radius: 50px;
          padding: 13px;
          color: white;
          font-family: 'Poppins', sans-serif;
          font-size: 14px;
          font-weight: 600;
          cursor: pointer;
          transition: all 0.2s;
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 8px;
        }

        .btn:hover { background: #3a5ce5; transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }
        .btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

        .spinner {
          display: none;
          width: 15px; height: 15px;
          border: 2px solid rgba(255,255,255,0.4);
          border-top-color: white;
          border-radius: 50%;
          animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .register-link { margin-top: 16px; font-size: 12px; color: #999; }
        .register-link a { color: #4a6cf7; font-weight: 600; text-decoration: none; }
        .register-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="card">

    <div class="logo">
        <div class="logo-icon">
            <svg viewBox="0 0 24 24"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/></svg>
        </div>
        <div class="logo-name">Smart<span>Rent</span></div>
    </div>

    <div class="alert" id="alert"></div>

    <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="Enter your email"/>
    </div>

    <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password"/>
    </div>

    <div class="forgot">
        <a href="#">Forget your password?</a>
    </div>

    <button class="btn" id="loginBtn" onclick="handleLogin()">
        <span id="btnText">Login</span>
        <div class="spinner" id="spinner"></div>
    </button>

    <div class="register-link">
        Don't have an account? <a href="register.html">Register</a>
    </div>

</div>

<script>
    function showAlert(msg, type) {
      const a = document.getElementById('alert');
      a.textContent = msg;
      a.className = 'alert ' + type;
    }

    function clearAlert() { document.getElementById('alert').className = 'alert'; }

    function setLoading(val) {
      document.getElementById('loginBtn').disabled = val;
      document.getElementById('btnText').style.display = val ? 'none' : 'inline';
      document.getElementById('spinner').style.display = val ? 'block' : 'none';
    }

    async function handleLogin() {
      clearAlert();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showAlert('Please enter your email and password.', 'error'); return;
      }

      setLoading(true);
      try {
        const res = await fetch('http://localhost:8081/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (res.ok) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('role', data.role);
          localStorage.setItem('email', data.email);
          localStorage.setItem('firstName', data.firstName);

          showAlert('Login successful! Redirecting...', 'success');

          setTimeout(() => {
            if (data.role === 'admin')       window.location.href = 'admin-dashboard.html';
            else if (data.role === 'vendor') window.location.href = 'vendor-dashboard.html';
            else                             window.location.href = 'customer-dashboard.html';
          }, 1000);
        } else {
          showAlert(data || 'Invalid email or password.', 'error');
        }
      } catch (err) {
        showAlert('Cannot connect to server. Is the backend running?', 'error');
      } finally {
        setLoading(false);
      }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
</script>
</body>
</html>
