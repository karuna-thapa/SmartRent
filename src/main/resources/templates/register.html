<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SmartRent — Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="/css/register.css"/>
</head>
<body>

<div class="card">

    <div class="logo">
        <img src="/images/SmartRentLogo.png" alt="SmartRent" class="auth-logo-img"/>
    </div>

    <div class="role-tabs">
        <button class="role-tab active" onclick="switchRole('customer', this)">Customer</button>
        <button class="role-tab" onclick="switchRole('vendor', this)">Vendor</button>
    </div>

    <div class="alert" id="alert"></div>

    <!-- CUSTOMER FORM -->
    <div class="form-section active" id="customerForm">
        <div class="form-grid">
            <div class="field">
                <label>First Name</label>
                <input type="text" id="firstName" autocomplete="off"/>
            </div>
            <div class="field">
                <label>Last Name</label>
                <input type="text" id="lastName" autocomplete="off"/>
            </div>
            <div class="field">
                <label>Email</label>
                <input type="email" id="email" autocomplete="off"/>
            </div>
            <div class="field">
                <label>Phone Number</label>
                <input type="tel" id="phone" placeholder="98XXXXXXXX" autocomplete="off"/>
            </div>
            <div class="field">
                <label>Birthday <span class="dob-hint">(must be 18+)</span></label>
                <input type="date" id="dob" autocomplete="off"/>
            </div>
            <div class="field">
                <label>Address</label>
                <input type="text" id="address" autocomplete="off"/>
            </div>
            <div class="field full">
                <label>Driving License Number</label>
                <input type="text" id="licenseNo" placeholder="Your license number" autocomplete="off"/>
            </div>
            <div class="field">
                <label>Password</label>
                <div class="pw-input-wrap">
                    <input type="password" id="password" placeholder="password" autocomplete="new-password"/>
                    <button type="button" class="pw-eye" onclick="togglePwVisibility('password', this)" tabindex="-1">
                        <svg class="eye-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        <svg class="eye-hide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                    </button>
                </div>
            </div>
            <div class="field">
                <label>Confirm Password</label>
                <div class="pw-input-wrap">
                    <input type="password" id="confirmPassword" placeholder="Repeat password" autocomplete="new-password"/>
                    <button type="button" class="pw-eye" onclick="togglePwVisibility('confirmPassword', this)" tabindex="-1">
                        <svg class="eye-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        <svg class="eye-hide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                    </button>
                </div>
            </div>
        </div>
        <button class="btn" id="registerBtn" onclick="submitCustomer()">
            <span id="btnText">Register</span>
            <div class="spinner" id="spinner"></div>
        </button>
    </div>

    <!-- VENDOR FORM -->
    <div class="form-section" id="vendorForm">
        <div class="vendor-note">
            ⏳ Vendor accounts require admin approval before activation.
        </div>
        <div class="form-grid">
            <div class="field">
                <label>Full Name</label>
                <input type="text" id="vendorName" placeholder="Owner / contact name" autocomplete="off"/>
            </div>
            <div class="field">
                <label>Company Name</label>
                <input type="text" id="companyName" placeholder="Registered company name" autocomplete="off"/>
            </div>
            <div class="field">
                <label>Email</label>
                <input type="email" id="vendorEmail" placeholder="company@example.com" autocomplete="off"/>
            </div>
            <div class="field">
                <label>Phone Number</label>
                <input type="tel" id="vendorPhone" placeholder="98XXXXXXXX" autocomplete="off"/>
            </div>
            <div class="field">
                <label>Registration No.</label>
                <input type="text" id="registrationNo" placeholder="Business reg. number" autocomplete="off"/>
            </div>
            <div class="field">
                <label>Brand</label>
                <select id="brandName" class="field-select">
                    <option value="">— Select a brand —</option>
                </select>
            </div>
            <div class="field full">
                <label>Company Registration Document</label>
                <input type="file" id="vendorRegistrationDoc" accept="image/*"/>
            </div>
            <div class="field">
                <label>Password</label>
                <div class="pw-input-wrap">
                    <input type="password" id="vendorPassword" placeholder="min. 6 characters" autocomplete="new-password"/>
                    <button type="button" class="pw-eye" onclick="togglePwVisibility('vendorPassword', this)" tabindex="-1">
                        <svg class="eye-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        <svg class="eye-hide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                    </button>
                </div>
            </div>
            <div class="field">
                <label>Confirm Password</label>
                <div class="pw-input-wrap">
                    <input type="password" id="vendorConfirmPassword" placeholder="Repeat password" autocomplete="new-password"/>
                    <button type="button" class="pw-eye" onclick="togglePwVisibility('vendorConfirmPassword', this)" tabindex="-1">
                        <svg class="eye-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        <svg class="eye-hide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                    </button>
                </div>
            </div>
        </div>
        <button class="btn" id="vendorRegisterBtn" onclick="submitVendor()">
            <span id="vendorBtnText">Register as Vendor</span>
            <div class="spinner" id="vendorSpinner"></div>
        </button>
    </div>

    <div class="login-link">
        Already have an account? <a href="/login">Login</a>
    </div>

</div>

<script src="/js/register.js"></script>
</body>
</html>
