<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SmartRent — Vendor Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="/css/home.css"/>
    <style>
        body { background: #0f0f1a; color: #e0e0e0; font-family: 'Poppins', sans-serif; margin: 0; }
        .dashboard-wrapper { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 36px; }
        .dashboard-header h1 { font-size: 1.8rem; font-weight: 700; color: #fff; }
        .dashboard-header h1 span { color: #4a6cf7; }
        .welcome-msg { color: #aaa; font-size: 0.95rem; margin-top: 4px; }
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .card { background: #1a1a2e; border: 1px solid rgba(74,108,247,0.2); border-radius: 12px; padding: 24px; }
        .card-label { font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .card-value { font-size: 2rem; font-weight: 700; color: #4a6cf7; margin: 8px 0 4px; }
        .card-sub { font-size: 0.82rem; color: #666; }
        .section-title { font-size: 1.1rem; font-weight: 600; color: #fff; margin-bottom: 16px; }
        .action-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 40px; }
        .action-btn { background: rgba(74,108,247,0.1); border: 1px solid rgba(74,108,247,0.3); border-radius: 10px;
                      padding: 18px 16px; text-align: center; cursor: pointer; transition: all 0.2s; color: #c8d0ff; font-size: 0.9rem; font-weight: 500; }
        .action-btn:hover { background: rgba(74,108,247,0.25); border-color: #4a6cf7; color: #fff; }
        .action-btn svg { display: block; margin: 0 auto 8px; }
        .logout-btn { background: rgba(255,80,80,0.1); border: 1px solid rgba(255,80,80,0.3); color: #ff6b6b;
                      padding: 9px 22px; border-radius: 8px; font-size: 0.88rem; font-weight: 500; cursor: pointer;
                      font-family: 'Poppins', sans-serif; transition: all 0.2s; }
        .logout-btn:hover { background: rgba(255,80,80,0.25); border-color: #ff6b6b; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <a href="/home" class="logo">
            <img src="/images/SmartRentLogo.png" alt="SmartRent" class="logo-full-img"/>
        </a>
        <ul class="nav-links">
            <li><a href="/vendor/dashboard" class="active">Dashboard</a></li>
            <li><a href="#">My Vehicles</a></li>
            <li><a href="#">Bookings</a></li>
            <li><a href="#">Reviews</a></li>
        </ul>
        <div class="nav-auth">
            <span id="navName" style="color:#c8d0ff; font-size:0.9rem; margin-right:12px;"></span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>
</nav>

<div class="dashboard-wrapper">
    <div class="dashboard-header">
        <div>
            <h1>Vendor <span>Dashboard</span></h1>
            <p class="welcome-msg" id="welcomeMsg">Welcome back!</p>
        </div>
    </div>

    <div class="cards-grid">
        <div class="card">
            <div class="card-label">Total Vehicles</div>
            <div class="card-value">—</div>
            <div class="card-sub">Listed on SmartRent</div>
        </div>
        <div class="card">
            <div class="card-label">Active Bookings</div>
            <div class="card-value">—</div>
            <div class="card-sub">Currently rented out</div>
        </div>
        <div class="card">
            <div class="card-label">Total Reviews</div>
            <div class="card-value">—</div>
            <div class="card-sub">From customers</div>
        </div>
        <div class="card">
            <div class="card-label">Revenue</div>
            <div class="card-value">—</div>
            <div class="card-sub">This month</div>
        </div>
    </div>

    <p class="section-title">Quick Actions</p>
    <div class="action-grid">
        <div class="action-btn">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M12 5v14M5 12h14"/>
            </svg>
            Add Vehicle
        </div>
        <div class="action-btn">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>
            </svg>
            View Bookings
        </div>
        <div class="action-btn">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
            My Profile
        </div>
        <div class="action-btn">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M11.5 21A9.5 9.5 0 1 0 21 11.5"/><path d="M12 7v5l3 3"/>
            </svg>
            Rental History
        </div>
    </div>
</div>

<script>
    (function() {
        const role = localStorage.getItem('role');
        const token = localStorage.getItem('token');
        if (!token || role !== 'vendor') {
            window.location.href = '/login';
            return;
        }
        const name = localStorage.getItem('firstName');
        if (name) {
            document.getElementById('navName').textContent = name;
            document.getElementById('welcomeMsg').textContent = 'Welcome back, ' + name + '!';
        }
    })();

    function logout() {
        localStorage.clear();
        window.location.href = '/login';
    }
</script>
</body>
</html>
