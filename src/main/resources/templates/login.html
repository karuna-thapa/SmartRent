<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SmartRent — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="/css/login.css"/>
</head>
<body>

<div class="card">

    <div class="logo">
        <img src="/images/SmartRentLogo.png" alt="SmartRent" class="auth-logo-img"/>
    </div>

    <div class="alert" id="alert"></div>

    <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="Enter your email"/>
    </div>

    <div class="field">
        <label>Password</label>
        <div class="pw-input-wrap">
            <input type="password" id="password" placeholder="Enter your password"/>
            <button type="button" class="pw-eye" onclick="togglePwVisibility('password', this)" tabindex="-1">
                <svg class="eye-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="eye-hide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
        </div>
    </div>

    <div class="forgot">
        <a href="#">Forget your password?</a>
    </div>

    <button class="btn" id="loginBtn" onclick="handleLogin()">
        <span id="btnText">Login</span>
        <div class="spinner" id="spinner"></div>
    </button>

    <div class="register-link">
        Don't have an account? <a href="/register">Register</a>
    </div>

</div>

<script src="/js/login.js"></script>
</body>
</html>
